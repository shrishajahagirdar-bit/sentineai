apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-api-canary
  namespace: sentinelai-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane-api
      version: canary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane-api
        version: canary
    spec:
      containers:
        - name: control-plane-api
          image: python:3.12-slim
          workingDir: /app
          env:
            - name: CONTROL_PLANE_DATABASE_URL
              value: postgresql+psycopg2://sentinelai:sentinelai@sentinelai-postgresql:5432/sentinelai
            - name: CONTROL_PLANE_JWT_SECRET
              value: sentinelai-dev-secret
          command:
            - sh
            - -c
            - pip install -r requirements.txt && uvicorn control_plane.main:app --host 0.0.0.0 --port 8010
          ports:
            - containerPort: 8010
          volumeMounts:
            - name: app-source
              mountPath: /app
      volumes:
        - name: app-source
          hostPath:
            path: /srv/sentinelai
            type: DirectoryOrCreate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference-canary
  namespace: sentinelai-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ml-inference
      version: canary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ml-inference
        version: canary
    spec:
      containers:
        - name: ml-inference
          image: python:3.12-slim
          workingDir: /app
          command:
            - sh
            - -c
            - pip install -r requirements.txt && uvicorn runtime_services.ml_inference_api:app --host 0.0.0.0 --port 8030
          ports:
            - containerPort: 8030
          volumeMounts:
            - name: app-source
              mountPath: /app
      volumes:
        - name: app-source
          hostPath:
            path: /srv/sentinelai
            type: DirectoryOrCreate
