apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-kibana
  namespace: sentinelai-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinelai-kibana
  template:
    metadata:
      labels:
        app: sentinelai-kibana
    spec:
      containers:
        - name: kibana
          image: opensearchproject/opensearch-dashboards:2.16.0
          env:
            - name: OPENSEARCH_HOSTS
              value: '["http://sentinelai-opensearch:9200"]'
          ports:
            - containerPort: 5601
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-kibana
  namespace: sentinelai-prod
spec:
  selector:
    app: sentinelai-kibana
  ports:
    - port: 5601
      targetPort: 5601
