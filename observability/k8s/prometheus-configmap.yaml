apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinelai-prometheus-config
  namespace: sentinelai-prod
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: control-plane
        static_configs:
          - targets: ['control-plane-api:8010']
      - job_name: dashboard
        static_configs:
          - targets: ['dashboard-frontend:8501']
      - job_name: ml-inference
        static_configs:
          - targets: ['ml-inference:8030']
