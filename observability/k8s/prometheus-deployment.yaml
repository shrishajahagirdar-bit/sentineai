apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-prometheus
  namespace: sentinelai-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinelai-prometheus
  template:
    metadata:
      labels:
        app: sentinelai-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: sentinelai-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-prometheus
  namespace: sentinelai-prod
spec:
  selector:
    app: sentinelai-prometheus
  ports:
    - port: 9090
      targetPort: 9090
