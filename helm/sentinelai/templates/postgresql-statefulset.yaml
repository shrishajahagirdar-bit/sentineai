{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sentinelai-postgresql
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: sentinelai-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: sentinelai-postgresql
  template:
    metadata:
      labels:
        app: sentinelai-postgresql
    spec:
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          env:
            - name: POSTGRES_DB
              value: sentinelai
            - name: POSTGRES_USER
              value: sentinelai
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinelai-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-postgresql
  namespace: {{ .Values.global.namespace }}
spec:
  clusterIP: None
  selector:
    app: sentinelai-postgresql
  ports:
    - port: 5432
      targetPort: 5432
{{- end }}
