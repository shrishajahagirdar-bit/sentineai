version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sentinelai-postgres
    environment:
      POSTGRES_DB: sentinelai
      POSTGRES_USER: sentinelai
      POSTGRES_PASSWORD: sentinelai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./control_plane/sql:/docker-entrypoint-initdb.d

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sentinelai-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sentinelai-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  control-plane-api:
    image: python:3.12-slim
    container_name: sentinelai-control-plane
    working_dir: /app
    depends_on:
      - postgres
    environment:
      CONTROL_PLANE_DATABASE_URL: postgresql+psycopg2://sentinelai:sentinelai@postgres:5432/sentinelai
      CONTROL_PLANE_JWT_SECRET: sentinelai-dev-secret
      CONTROL_PLANE_BOOTSTRAP_ADMIN_EMAIL: admin@sentinelai.local
      CONTROL_PLANE_BOOTSTRAP_ADMIN_PASSWORD: ChangeMe123!
    ports:
      - "8010:8010"
    volumes:
      - ./:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn control_plane.main:app --host 0.0.0.0 --port 8010"

volumes:
  postgres_data:
