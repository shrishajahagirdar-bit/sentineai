apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-vault
  namespace: sentinelai-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinelai-vault
  template:
    metadata:
      labels:
        app: sentinelai-vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.17.2
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: root
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: 0.0.0.0:8200
          args:
            - server
            - -dev
          ports:
            - containerPort: 8200
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-vault
  namespace: sentinelai-prod
spec:
  selector:
    app: sentinelai-vault
  ports:
    - port: 8200
      targetPort: 8200
