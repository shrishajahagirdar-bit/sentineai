apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sentinelai-allow-gateway-to-control-plane
  namespace: sentinelai-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: control-plane-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: sentinelai-gateway
